version: '3.8'

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=servdeal
    ports:
      - 27017:27017

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env.compose
    ports:
      - 5000:5000
    depends_on:
      - mongo
    volumes:
      - ./backend:/app

  web:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - .env.compose
    ports:
      - 3000:3000
    depends_on:
      - api
    volumes:
      - ./frontend:/app

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

volumes:
  mongo-data:
