services:
  - type: web
    name: servdeal-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: OTP_EXPOSE_IN_RESPONSE
        value: true
      - key: SMS_PROVIDER
        value: msg91
      - key: MSG91_AUTH_KEY
        value: YOUR_MSG91_AUTH_KEY
      - key: MSG91_OTP_TEMPLATE_ID
        value: YOUR_MSG91_TEMPLATE_ID

  - type: web
    name: servdeal-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://servdeal-backend.onrender.com/api/v1

